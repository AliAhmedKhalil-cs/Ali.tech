<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Ali Ahmed Khalil Gamil (Ali Kassap) | Computer Science & AI Specialist at El Sewedy University.">
<title>Ali Kassap | VIP Portfolio</title>

<meta name="keywords" content="Ali Kassap, Ali Ahmed Khalil, El Sewedy University, AI Engineer Egypt, Software Developer Al Khusus">
<meta property="og:title" content="Ali Kassap | AI & Software Engineer">
<meta property="og:description" content="Innovating the future with AI and robust software solutions.">
<meta property="og:url" content="https://alikassap.website">

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://s.pageclip.co/v1/pageclip.css" media="screen">

<style>
/* ================= CSS ================= */
* { margin: 0; padding: 0; box-sizing: border-box; scroll-behavior: smooth; }
:root {
  --bg-main: #030305; --bg-card: rgba(17, 17, 17, 0.6);
  --primary: #4f46e5; --primary-glow: rgba(79, 70, 229, 0.6);
  --secondary: #06b6d4; --text-main: #ffffff;
  --text-muted: #a1a1aa; --border-color: rgba(255, 255, 255, 0.08);
}
body { font-family: 'Outfit', sans-serif; background-color: var(--bg-main); color: var(--text-main); overflow-x: hidden; cursor: none; }

/* هدية VIP: Live Status Indicator */
.status-indicator { display: flex; align-items: center; gap: 8px; font-size: 0.85rem; color: var(--secondary); background: rgba(6, 182, 212, 0.1); padding: 5px 12px; border-radius: 20px; border: 1px solid rgba(6, 182, 212, 0.2); }
.pulse-dot { width: 8px; height: 8px; background: #22c55e; border-radius: 50%; box-shadow: 0 0 10px #22c55e; animation: pulse 2s infinite; }
@keyframes pulse { 0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7); } 70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(34, 197, 94, 0); } 100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); } }

/* Preloader & Layout Elements (Simplified for speed) */
#preloader { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #000; z-index: 999999; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: 0.8s; }
.loader-bar-bg { width: 200px; height: 3px; background: rgba(255,255,255,0.1); border-radius: 10px; overflow: hidden; margin-top: 15px; }
.loader-bar-fill { width: 0%; height: 100%; background: var(--secondary); animation: load 1.5s ease-in-out forwards; }
@keyframes load { 100% { width: 100%; } }

#bg-canvas { position: fixed; top: 0; left: 0; z-index: -1; }
.cursor-dot, .cursor-outline { position: fixed; top: 0; left: 0; transform: translate(-50%, -50%); border-radius: 50%; z-index: 9999999; pointer-events: none; }
.cursor-dot { width: 8px; height: 8px; background: var(--secondary); }
.cursor-outline { width: 40px; height: 40px; border: 2px solid rgba(6, 182, 212, 0.5); transition: 0.15s; }

/* Navbar */
.navbar { position: fixed; width: 100%; padding: 20px 5%; display: flex; justify-content: space-between; align-items: center; z-index: 1000; transition: 0.4s; }
.navbar.scrolled { background: rgba(5, 5, 5, 0.85); backdrop-filter: blur(15px); padding: 12px 5%; border-bottom: 1px solid var(--border-color); }
.logo { font-size: 1.6rem; font-weight: 800; cursor: none; }
.logo span { color: var(--primary); }

/* Hero Section */
section { padding: 120px 0; }
.container { width: 90%; max-width: 1200px; margin: 0 auto; }
.hero { text-align: center; min-height: 80vh; display: flex; align-items: center; }
.title { font-size: 4.5rem; font-weight: 800; margin-bottom: 20px; }
.typing-text { color: var(--secondary); }
.description { color: var(--text-muted); font-size: 1.2rem; max-width: 600px; margin: 0 auto 30px; }

/* Contact Form - PRECISE FIX */
.contact-wrapper { background: var(--bg-card); border-radius: 20px; border: 1px solid var(--border-color); display: grid; grid-template-columns: 1fr 1.5fr; overflow: hidden; }
.contact-info { padding: 50px; background: rgba(255,255,255,0.02); }
.contact-form { padding: 50px; display: flex; flex-direction: column; gap: 20px; }
.input-row { display: flex; gap: 15px; }
input, select, textarea { width: 100%; padding: 15px; background: #000; border: 1px solid var(--border-color); border-radius: 10px; color: #fff; font-family: inherit; }
input:focus, textarea:focus { border-color: var(--secondary); outline: none; }

.btn-primary { background: var(--primary); color: #fff; padding: 15px 30px; border-radius: 10px; border: none; font-weight: 700; cursor: none; transition: 0.3s; }
.btn-primary:hover { background: var(--secondary); transform: translateY(-3px); box-shadow: 0 10px 20px rgba(6, 182, 212, 0.3); }

/* Toast */
#success-toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px); background: #22c55e; color: #fff; padding: 12px 25px; border-radius: 50px; opacity: 0; transition: 0.4s; z-index: 10000; }
#success-toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

@media (max-width: 768px) { .contact-wrapper { grid-template-columns: 1fr; } .input-row { flex-direction: column; } .title { font-size: 2.8rem; } }
</style>
</head>
<body>

<div id="success-toast">✅ Message Sent to Ali!</div>

<div id="preloader">
  <div class="loader-text">root@ali-kassap:~$ initializing_vips...</div>
  <div class="loader-bar-bg"><div class="loader-bar-fill"></div></div>
</div>

<canvas id="bg-canvas"></canvas>
<div class="cursor-dot"></div><div class="cursor-outline"></div>

<nav class="navbar" id="navbar">
  <div class="logo">Ali<span>.Kassap</span></div>
  <div class="status-indicator">
    <div class="pulse-dot"></div>
    <span>Status: Open for Projects</span>
  </div>
</nav>

<section class="hero">
  <div class="container">
    <h1 class="title">I Engineer <span class="typing-text">AI Systems</span></h1>
    <p class="description">CS Student & AI Specialist at SUT. Transforming complex ideas into scalable reality.</p>
    <a href="#contact" class="btn-primary" style="text-decoration:none;">Let's Talk</a>
  </div>
</section>

<section id="contact">
  <div class="container">
    <div class="contact-wrapper">
      <div class="contact-info">
        <h3>Contact Info</h3>
        <p style="margin: 20px 0; color: var(--text-muted);">Feel free to reach out for collaborations or project inquiries.</p>
        <div style="font-size: 1.5rem; display:flex; gap:15px;">
           <a href="https://github.com/AliAhmedKhalil-cs" style="color:#fff;"><i class="fab fa-github"></i></a>
           <a href="https://linkedin.com/in/ali-ahmed00" style="color:#fff;"><i class="fab fa-linkedin"></i></a>
        </div>
      </div>

      <form action="https://send.pageclip.co/0T79zesC0CK4msm712EJJYrhUW8WQ2lW" class="contact-form pageclip-form" method="post">
        <div class="input-row">
          <input type="text" name="name" placeholder="Name" required>
          <input type="email" name="email" placeholder="Email" required>
        </div>
        <select name="service">
          <option>AI Solutions</option>
          <option>Web Development</option>
          <option>Software Architecture</option>
        </select>
        <textarea name="message" rows="4" placeholder="Your Message" required></textarea>
        <button type="submit" class="btn-primary pageclip-form__submit">
          <span>Submit Request</span>
        </button>
      </form>
    </div>
  </div>
</section>

<script src="https://s.pageclip.co/v1/pageclip.js" charset="utf-8"></script>
<script>
  // معالجة الـ Form
  var form = document.querySelector('.pageclip-form');
  PageClip.form(form, {
    onResponse: function (error, response) {
      if (response) {
        const toast = document.getElementById('success-toast');
        toast.classList.add('show');
        form.reset();
        setTimeout(() => toast.classList.remove('show'), 4000);
      }
      return false;
    }
  });

  // Preloader
  window.addEventListener('load', () => {
    setTimeout(() => { document.getElementById('preloader').style.display = 'none'; }, 1000);
  });

  // Cursor
  const dot = document.querySelector('.cursor-dot');
  const out = document.querySelector('.cursor-outline');
  window.addEventListener('mousemove', (e) => {
    dot.style.left = e.clientX + 'px'; dot.style.top = e.clientY + 'px';
    out.animate({ left: e.clientX + 'px', top: e.clientY + 'px' }, { duration: 400, fill: "forwards" });
  });

  // Scroll Navbar
  window.onscroll = () => {
    document.getElementById('navbar').classList.toggle('scrolled', window.scrollY > 50);
  };
</script>
</body>
</html>
